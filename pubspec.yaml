name: hobby_haven
description: "Hobifi is your ultimate hub for discovering and booking exciting hobbies and activities, connecting passionate individuals with local businesses through a vibrant, intuitive platform."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  cached_network_image: ^3.0.0
  crypto: ^3.0.0
  sign_in_with_apple: '>=6.1.2'
  google_sign_in: '>=6.2.1'
  uuid: ^4.0.0
  qr_flutter: ^4.0.0
  webview_flutter: ^4.0.0
  http: ^1.0.0
  url_launcher: ^6.0.0
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: 8.0.2
  provider: ^6.1.2
  go_router: ^16.2.0
  supabase_flutter: '>=1.10.0'
  shared_preferences: ^2.0.0
  fl_chart: 0.68.0
  image_picker: '>=1.1.2'
  intl: 0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
