[auth]
site_url = "io.supabase.hobifi://login-callback/"
additional_redirect_urls = ["io.supabase.hobifi://login-callback/"]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "1m0s"

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email.template.confirmation]
subject = "Your Hobifi verification code"
content_path = "./templates/confirmation.html"

[auth.email.template.recovery]
subject = "Reset your Hobifi password"
content_path = "./templates/recovery.html"
